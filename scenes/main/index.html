<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <script src="../../_shared/deps/jquery.min.js"></script>
    <script src="../../_shared/deps/countUp.js"></script>
    <script src="../../_shared/deps/reconnecting-websocket.min.js"></script>
    <script src="../../_shared/utils.js"></script>
  </head>

  <body>
    <div class="main">
      <div class="header">
        <div class="header-team red">
          <div class="team-seed" id="red_seed">#0</div>
          <div class="team-code" id="red_code">RED</div>
          <div class="team-name" id="red_name">Red Team</div>
        </div>

        <div class="header-middle">
          <div class="tournament-name">UNITED STATES CUP 2026</div>
          <div class="stage-name" id="stage_name">ROUND OF 16</div>
          <div class="now-playing" id="now_playing">Artist - Title [Difficulty]</div>
        </div>

        <div class="header-team blue">
          <div class="team-seed" id="blue_seed">#0</div>
          <div class="team-code" id="blue_code">BLU</div>
          <div class="team-name" id="blue_name">Blue Team</div>
        </div>
      </div>

      <div class="gameplay-area">
        <div class="points-container" id="points_container">
          <div class="team-points-container red">
            <div class="team-points-title red"><span id="red_points_current">0</span><span>/</span><span id="red_points_max">0</span></div>
            <div class="team-points red" id="red_points"></div>
          </div>
          <div class="team-points-container blue">
            <div class="team-points-title blue"><span id="blue_points_current">0</span><span>/</span><span id="blue_points_max">0</span></div>
            <div class="team-points blue" id="blue_points"></div>
          </div>
        </div>
      </div>

      <div class="footer">
        <div class="team-score-container red" id="red_score_container">
          <div class="team-score-title" id="red_score_title">RED SCORE</div>
          <div class="team-score red" id="red_score">0</div>
        </div>

        <div class="footer-middle">
          <div class="logo"></div>
          <div class="score-diff-container" id="score_diff_container">
            <i class="score-indicator red">◀</i>
            <div class="score-diff" id="score_diff">0</div>
            <i class="score-indicator blue">▶</i>
          </div>
        </div>

        <div class="team-score-container blue" id="blue_score_container">
          <div class="team-score-title" id="blue_score_title">BLUE SCORE</div>
          <div class="team-score blue" id="blue_score">0</div>
        </div>

        <div class="chat-container" id="chat_container"><div class="chat" id="chat"></div></div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
